name: Build Windows
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-cppwinrt
            mingw-w64-ucrt-x86_64-curl-winssl
            mingw-w64-ucrt-x86_64-miniupnpc
            mingw-w64-ucrt-x86_64-onevpl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-MinHook
            mingw-w64-ucrt-x86_64-nodejs
            mingw-w64-ucrt-x86_64-nsis

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: D:/a/Sunshine/Sunshine/.ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: |
            ccache-windows-

      - name: Build
        env:
          CCACHE_DIR: D:/a/Sunshine/Sunshine/.ccache
          CCACHE_MAXSIZE: 1G
        run: |
          mkdir -p build
          cmake -B build -G Ninja -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DSUNSHINE_ENABLE_CUDA=OFF \
            -DBUILD_DOCS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          ninja -C build
          ccache -s

      - name: Collect runtime files
        run: |
          mkdir -p dist

          # Copy sunshine exe and build DLLs
          cp build/sunshine.exe dist/
          cp build/*.dll dist/ 2>/dev/null || true

          # Use ldd to find all required DLLs from MSYS2
          ldd build/sunshine.exe | grep ucrt64 | awk '{print $3}' | while read dll; do
            cp "$dll" dist/ 2>/dev/null || true
          done

          # Copy web assets
          cp -r src_assets/web dist/assets 2>/dev/null || true

          echo "Distribution contents:"
          ls -lh dist/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-windows
          path: dist/
