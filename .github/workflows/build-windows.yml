name: Build Windows
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-cppwinrt
            mingw-w64-ucrt-x86_64-curl-winssl
            mingw-w64-ucrt-x86_64-miniupnpc
            mingw-w64-ucrt-x86_64-onevpl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-MinHook
            mingw-w64-ucrt-x86_64-nodejs
            mingw-w64-ucrt-x86_64-nsis

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: D:/a/Sunshine/Sunshine/.ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: |
            ccache-windows-

      - name: Build
        env:
          CCACHE_DIR: D:/a/Sunshine/Sunshine/.ccache
          CCACHE_MAXSIZE: 1G
        run: |
          mkdir -p build
          cmake -B build -G Ninja -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DSUNSHINE_ENABLE_CUDA=OFF \
            -DBUILD_DOCS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          ninja -C build
          ccache -s

      - name: Package portable
        run: |
          cd build
          cpack -G ZIP || true
          ls -lh *.zip 2>/dev/null || echo "no zip created"
          ls -lh sunshine.exe

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-exe
          path: D:/a/Sunshine/Sunshine/build/sunshine.exe

      - name: Upload zip if exists
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sunshine-zip
          path: D:/a/Sunshine/Sunshine/build/*.zip
          if-no-files-found: ignore

      - name: Upload NSIS installer
        run: |
          cd build
          cpack -G NSIS || true
          ls -lh *.exe 2>/dev/null

      - name: Upload installer
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sunshine-installer
          path: D:/a/Sunshine/Sunshine/build/Sunshine-*.exe
          if-no-files-found: ignore
