name: Build Windows
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-2025
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-cppwinrt
            mingw-w64-ucrt-x86_64-curl-winssl
            mingw-w64-ucrt-x86_64-miniupnpc
            mingw-w64-ucrt-x86_64-onevpl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-MinHook
            mingw-w64-ucrt-x86_64-nodejs
            mingw-w64-ucrt-x86_64-nsis

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: D:/a/Sunshine/Sunshine/.ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: |
            ccache-windows-

      - name: Build
        env:
          CCACHE_DIR: D:/a/Sunshine/Sunshine/.ccache
          CCACHE_MAXSIZE: 1G
        run: |
          mkdir -p build
          cmake -B build -G Ninja -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DSUNSHINE_ENABLE_CUDA=OFF \
            -DBUILD_DOCS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          ninja -C build
          ccache -s

      - name: Collect runtime files
        shell: pwsh
        run: |
          # Create distribution directory
          New-Item -ItemType Directory -Force -Path dist

          # Copy sunshine exe
          Copy-Item build/sunshine.exe dist/

          # Copy all DLLs from build dir
          Get-ChildItem build/*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination dist/

          # Copy required MSYS2/MinGW runtime DLLs
          $mingwBin = "D:/a/_temp/msys64/ucrt64/bin"
          $requiredDlls = @(
            "libstdc++-6.dll",
            "libgcc_s_seh-1.dll",
            "libwinpthread-1.dll",
            "libcurl-4.dll",
            "libopus-0.dll",
            "libssl-3-x64.dll",
            "libcrypto-3-x64.dll",
            "libminiupnpc.dll",
            "libMinHook.dll",
            "libboost_filesystem-mt.dll",
            "libboost_log-mt.dll",
            "libboost_log_setup-mt.dll",
            "libboost_program_options-mt.dll",
            "libboost_thread-mt.dll",
            "libboost_json-mt.dll",
            "libboost_regex-mt.dll",
            "libboost_url-mt.dll",
            "libboost_locale-mt.dll",
            "libboost_atomic-mt.dll",
            "libboost_chrono-mt.dll",
            "libboost_container-mt.dll",
            "libboost_context-mt.dll",
            "libboost_coroutine-mt.dll",
            "libboost_date_time-mt.dll",
            "libiconv-2.dll",
            "libidn2-0.dll",
            "libssh2-1.dll",
            "libnghttp2-14.dll",
            "libzstd.dll",
            "libbrotlidec.dll",
            "libbrotlicommon.dll",
            "libpsl-5.dll",
            "zlib1.dll",
            "libintl-8.dll",
            "libunistring-5.dll"
          )
          foreach ($dll in $requiredDlls) {
            $src = Join-Path $mingwBin $dll
            if (Test-Path $src) {
              Copy-Item $src dist/
            }
          }

          # Also grab any DLL that sunshine.exe actually needs
          # Use ldd equivalent
          $output = & "D:/a/_temp/msys64/ucrt64/bin/ldd.exe" "build/sunshine.exe" 2>&1
          foreach ($line in $output) {
            if ($line -match "ucrt64.*=> (.*\.dll)") {
              $dllPath = $matches[1].Trim()
              if (Test-Path $dllPath) {
                $dllName = Split-Path $dllPath -Leaf
                if (-not (Test-Path "dist/$dllName")) {
                  Copy-Item $dllPath dist/
                }
              }
            }
          }

          # Copy web assets and config template
          if (Test-Path "src_assets/web") {
            Copy-Item -Recurse "src_assets/web" dist/assets/
          }

          Write-Host "Distribution contents:"
          Get-ChildItem dist/ | Format-Table Name, Length

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-windows
          path: dist/
